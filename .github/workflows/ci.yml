name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Brakeman
        env:
          RAILS_ENV: development
        run: bin/brakeman --no-pager

      - name: Run Rails tests (make test)
        env:
          RAILS_ENV: test
          POSTGRESQL_USER: postgres
          POSTGRESQL_PASSWORD: postgres
          POSTGRESQL_HOST: localhost
        run: make test

  scan_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Audit JS dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Rubocop
        env:
          RAILS_ENV: development
        run: bin/rubocop -f github

  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: matchtime_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Prepare DB
        env:
          RAILS_ENV: test
          POSTGRESQL_USER: postgres
          POSTGRESQL_PASSWORD: postgres
          POSTGRESQL_HOST: localhost
        run: bin/rails db:test:prepare

      - name: Run RSpec
        env:
          RAILS_ENV: test
          POSTGRESQL_USER: postgres
          POSTGRESQL_PASSWORD: postgres
          POSTGRESQL_HOST: localhost
        run: bundle exec rspec

  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: Run Jest
        run: npm test -- --ci --runInBand
